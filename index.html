<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mini PDF Grid Converter</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    body {
      font-family: sans-serif;
    }
  </style>
</head>

<body class="bg-zinc-100 text-zinc-900 min-h-screen p-6">

  <div class="max-w-7xl mx-auto flex flex-col lg:flex-row justify-between items-start lg:items-center gap-5 mb-8">

    <div>
      <h1 class="text-4xl font-bold">
        Mini PDF Grid Converter
      </h1>

      <p class="text-zinc-600 mt-2 text-sm">
        Ultra HD Compact PDF Generator
      </p>
    </div>

    <button class="px-5 py-3 rounded-2xl bg-black text-white shadow-lg">
      4×4 Compact Layout
    </button>
  </div>

  <div class="max-w-7xl mx-auto grid lg:grid-cols-2 gap-8">

    <div class="bg-white rounded-3xl shadow-xl p-8 border border-zinc-200">

      <h2 class="text-2xl font-semibold mb-5">
        Upload Images or PDF
      </h2>

      <div id="dropZone" class="border-2 border-dashed border-zinc-300 rounded-3xl p-12 text-center hover:border-black transition-all cursor-pointer bg-zinc-50">

        <div class="text-6xl mb-4">📄</div>

        <p class="font-medium text-lg">Drag & Drop Files</p>

        <p class="text-zinc-500 mt-2 text-sm">PNG, JPG, PDF Supported</p>

        <button class="mt-6 px-6 py-3 rounded-2xl bg-black text-white font-medium">Choose Files</button>

        <input id="fileInput" type="file" multiple accept="image/*,.pdf" class="hidden"/>
      </div>

      <div class="mt-8">

        <div class="flex items-center justify-between mb-4">

          <h3 class="text-lg font-semibold">Uploaded Pages</h3>

          <span id="fileCount" class="text-sm text-zinc-500">0 Pages</span>
        </div>

        <div id="fileList" class="space-y-3 max-h-[300px] overflow-y-auto pr-2"></div>
      </div>

      <div class="mt-8 grid grid-cols-2 gap-4">

        <div class="bg-zinc-100 rounded-2xl p-5">
          <p class="text-zinc-500 text-sm">Layout</p>
          <h3 class="text-2xl font-bold mt-1">4 × 4</h3>
        </div>

        <div class="bg-zinc-100 rounded-2xl p-5">
          <p class="text-zinc-500 text-sm">Mini Size</p>
          <h3 class="text-lg font-bold mt-1">5.25 × 7.42 cm</h3>
        </div>

        <div class="bg-zinc-100 rounded-2xl p-5">
          <p class="text-zinc-500 text-sm">Pages Per Sheet</p>
          <h3 class="text-2xl font-bold mt-1">16</h3>
        </div>

        <div class="bg-zinc-100 rounded-2xl p-5">
          <p class="text-zinc-500 text-sm">DPI</p>
          <h3 class="text-2xl font-bold mt-1">1200+</h3>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-3xl shadow-xl p-8 border border-zinc-200 flex flex-col">

      <div class="flex items-center justify-between mb-6">

        <h2 class="text-2xl font-semibold">Live Preview</h2>

        <button id="generateBtn" class="px-5 py-3 rounded-2xl bg-black text-white shadow-lg">
          Generate PDF
        </button>
      </div>

      <div id="progressSection" class="hidden mb-6 bg-zinc-100 rounded-3xl p-5 border border-zinc-200">
        <div class="flex items-center justify-between mb-3">
          <p class="font-medium">Creating Ultra HD PDF...</p>
          <span id="progressText" class="font-bold">0%</span>
        </div>
        <div class="w-full h-4 bg-zinc-300 rounded-full overflow-hidden">
          <div id="progressBar" class="h-full bg-black transition-all duration-300 rounded-full" style="width: 0%"></div>
        </div>
      </div>

      <div class="bg-zinc-200 rounded-2xl p-4 flex justify-center overflow-auto">
        <div id="previewGrid" class="w-[420px] h-[594px] bg-white shadow-2xl grid grid-cols-4 grid-rows-4 overflow-hidden"></div>
      </div>
    </div>
  </div>

<script>
const { jsPDF } = window.jspdf
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'

const files=[]
const fileInput=document.getElementById('fileInput')
const dropZone=document.getElementById('dropZone')
const fileList=document.getElementById('fileList')
const previewGrid=document.getElementById('previewGrid')
const generateBtn=document.getElementById('generateBtn')
const progressSection=document.getElementById('progressSection')
const progressBar=document.getElementById('progressBar')
const progressText=document.getElementById('progressText')
const fileCount=document.getElementById('fileCount')

dropZone.addEventListener('click',()=>fileInput.click())
fileInput.addEventListener('change',e=>handleFiles(e.target.files))
dropZone.addEventListener('dragover',e=>e.preventDefault())
dropZone.addEventListener('drop',e=>{e.preventDefault();handleFiles(e.dataTransfer.files)})

async function handleFiles(selectedFiles){
const fileArray=Array.from(selectedFiles)
for(const file of fileArray){
if(file.type.includes('image')){
files.push({name:file.name,preview:URL.createObjectURL(file)})
}else if(file.type==='application/pdf'){
const pdfData=await file.arrayBuffer()
const pdf=await pdfjsLib.getDocument({data:pdfData}).promise
for(let pageNum=1;pageNum<=pdf.numPages;pageNum++){
const page=await pdf.getPage(pageNum)
const viewport=page.getViewport({scale:6})
const canvas=document.createElement('canvas')
const context=canvas.getContext('2d')
canvas.width=viewport.width
canvas.height=viewport.height
await page.render({canvasContext:context,viewport}).promise
files.push({name:file.name+' - Page '+pageNum,preview:canvas.toDataURL('image/jpeg',1.0)})
}}}
renderFiles()
}

function renderFiles(){
fileList.innerHTML=''
previewGrid.innerHTML=''
fileCount.innerText=files.length+' Pages'

files.forEach(file=>{
const item=document.createElement('div')
item.className='bg-zinc-100 rounded-2xl p-3 flex items-center gap-4'
item.innerHTML=`<img src="${file.preview}" class="w-14 h-14 object-cover rounded-xl"/><div><p class="font-medium truncate">${file.name}</p><p class="text-xs text-zinc-500">Ready</p></div>`
fileList.appendChild(item)
})

for(let i=0;i<16;i++){
const cell=document.createElement('div')
if(files[i]) cell.innerHTML=`<img src="${files[i].preview}" class="w-full h-full object-cover"/>`
previewGrid.appendChild(cell)
}
}

generateBtn.addEventListener('click',async()=>{
if(files.length===0)return alert('Upload files')
progressSection.classList.remove('hidden')

const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'})
const pageWidth=210,pageHeight=297
const cols=4,rows=4
const cellWidth=pageWidth/cols
const cellHeight=pageHeight/rows

for(let i=0;i<files.length;i++){
if(i>0&&i%16===0)pdf.addPage()
const idx=i%16
const x=(idx%cols)*cellWidth
const y=Math.floor(idx/cols)*cellHeight

const progress=Math.floor(((i+1)/files.length)*100)
progressBar.style.width=progress+'%'
progressText.innerText=progress+'%'

await new Promise(r=>setTimeout(r,10))
pdf.addImage(files[i].preview,'JPEG',x,y,cellWidth,cellHeight,undefined,'FAST')
}

pdf.save('mini-grid-output.pdf')
progressBar.style.width='100%'
progressText.innerText='100%'
})
</script>

</body>
</html>
